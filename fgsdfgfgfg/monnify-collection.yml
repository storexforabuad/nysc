components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      required: true
  schemas:
    AuthResponseSuccess:
      type: object
      properties:
        requestSuccessful:
          type: boolean
          description: Indicates if the request was successful.
          example: true
